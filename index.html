<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Desclution</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Navbar -->
  <div id="navbar"></div>
  <!-- Hero -->
  <div id="hero"></div>

  <!-- Main content: Tracklist form + list -->
  <main class="container">

    <section class="add-track">
      <!--Banner-1-->
      <header class="sbanner">
        <div class="sbanner-content"></div>
      </header>

      <h2>Submit Track:</h2>
      <form id="trackForm">
        <input type="text" id="title" placeholder="Title" required />
        <input type="text" id="artist" placeholder="Artist / Band" required />
        <input type="url" id="coverUrl" placeholder="Track Image (optional)" />
        <button type="submit">Add Track</button>
      </form>
    </section>

    <section class="tracklist">
      <!-- Banner-2 -->
      <header class="banner">
        <div class="banner-content"></div>
      </header>

      <h2>Audio Tracks:</h2>
      <ul id="tracksList"></ul>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 Desclution — Built with TypeScript • Wizard Nazim</p>
    <p>Learning project — preparing for React</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
